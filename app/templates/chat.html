<!DOCTYPE html>
<html>
<head>
  <title>Smart Chat Widget</title>
  <style>
    #chat { border: 1px solid #ccc; padding: 10px; width: 300px; height: 400px; overflow-y: scroll; }
    input[type=text] { width: 80%; }
  </style>
</head>
<body>
  <h3>🧠 Smart Support Bot</h3>
  <div id="chat"></div>
  <input id="msg" type="text" placeholder="پیام خود را وارد کنید..." />
  <button onclick="send()">ارسال</button>

  <script>
    let session_id = null;
    let token = "";

    async function auth() {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ username: "widget-bot", password: "123456" })
      });
      const data = await res.json();
      token = data.access_token;
    }

    async function send() {
      if (!token) await auth();

      const msg = document.getElementById("msg").value;
      document.getElementById("chat").innerHTML += `<div><b>شما:</b> ${msg}</div>`;
      document.getElementById("msg").value = "";

      if (!session_id) {
        const res = await fetch("/chat/start_chat?model_name=llama3-8b-8192", {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        session_id = data.session_id;
      }

      const response = await fetch("/chat/send_message", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ session_id: session_id, content: msg })
      });

      const reply = await response.json();
      document.getElementById("chat").innerHTML += `<div><b>بات:</b> ${reply.response}</div>`;
    }
  </script>
</body>
</html>
